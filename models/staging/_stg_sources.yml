version: 2

sources:
  - name: jaffle
    database: jaffle-shop-481609
    schema: jaffle
    description: Three main sources tables available in the Lengow data warehouse
    tables:
      - name: stg_clients_products
        description: Clients products data with basic cleaning and transformations applies, one row per client's product.
        columns:
          - name: product_id 
            description: The primary key of the client's product.
            data_tests:
              - not_null
              - unique
          - name: title
            description: The title of the client's product.
          - name: price
            description: The price of the client's product.
            tests: 
              - dbt_utils.expression_is_true:
                  arguments:
                    expression: ">= 0" 
          - name: stock_availability
            description: The stock availability of the client's product.
            data_tests:
              - accepted_values:
                  arguments:
                    values: [true, false]
                    quote: false
          - name: main_category
            description: The main category of the client's product.
          - name: is_active
            description: Whether the client's product is active or not.
            data_tests:
              - accepted_values:
                  arguments:
                    values: [true, false]
                    quote: false
          - name: updated_at
            description: The timestamp of the last update of the client's product.
            data_tests:
              - not_null

      - name: stg_markets_products
        description: Market products data with basic cleaning and transformations applies, one row per market product.
        data_tests:
          - dbt_utils.unique_combination_of_columns:
              arguments:
                combination_of_columns: 
                  - shop_id
                  - product_id
        columns:
          - name: shop_id
            description: The primary key of the shop.
          - name: product_id
            description: The primary key of the product sold in the market shop.
            data_tests:
              - relationships:
                  arguments:
                    to: ref('stg_clients_products')
                    field: product_id
          - name: title
            description: The name of the product sold in the market shop.
          - name: price
            description: The price of the product sold in the market shop.
            tests:
              - dbt_utils.expression_is_true:
                  arguments:
                    expression: ">= 0"
          - name: stock_availability
            description: The stock availability of the product sold in the market shop.
            data_tests:
              - accepted_values:
                  arguments:
                    values: [true, false]
                    quote: false
          - name: is_active
            description: Whether the product sold in the market shop is active or not.
            data_tests:
              - accepted_values:
                  arguments:
                    values: [true, false]
                    quote: false
          - name: updated_at
            description: The timestamp of the last update of the product sold in the market shop.
            data_tests:
              - not_null
          - name: failed_to_update
            description: Whether the product sold in the market shop failed to update or not.